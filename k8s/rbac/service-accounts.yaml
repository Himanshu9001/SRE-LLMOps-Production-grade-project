# MLflow service account — annotated with IRSA role for S3 artifact access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mlflow
  namespace: mlflow
  annotations:
    # IRSA: pod assumes this IAM role via OIDC — no static credentials
    eks.amazonaws.com/role-arn: "arn:aws:iam::011528270076:role/sre-llmops-production-mlflow-irsa"
---
# Training job service account — S3 read for datasets, write for adapters
apiVersion: v1
kind: ServiceAccount
metadata:
  name: training-job
  namespace: training
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::011528270076:role/sre-llmops-production-training-irsa"
---
# vLLM inference service account — S3 read for quantized models only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vllm
  namespace: inference
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::011528270076:role/sre-llmops-production-inference-irsa"
