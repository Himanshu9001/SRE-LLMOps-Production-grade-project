# vLLM with speculative decoding
# Draft: Llama 3 8B AWQ (fast, cheap)
# Verifier: Llama 3 8B AWQ (same model — high acceptance rate)
# Expected speedup: 1.8-2.5x for SRE-style short responses
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-speculative
  namespace: inference
  labels:
    app: vllm-speculative
    version: p13
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-speculative
  template:
    metadata:
      labels:
        app: vllm-speculative
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: vllm
      nodeSelector:
        node-type: gpu
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      initContainers:
        - name: download-models
          image: amazon/aws-cli:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Downloading verifier model (AWQ)..."
              aws s3 sync \
                s3://sre-llmops-artifacts/quantized/llama3-8b-awq-4bit \
                /models/verifier \
                --no-progress

              echo "Downloading draft model (AWQ — same model)..."
              # Use same model as draft — maximum acceptance rate
              # Could use smaller model (1-3B) for larger speedup at lower acceptance
              cp -r /models/verifier /models/draft

              echo "Models ready: $(du -sh /models/)"
          env:
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
          volumeMounts:
            - name: model-storage
              mountPath: /models
          resources:
            requests:
              memory: "4Gi"
              cpu:    "4"
            limits:
              memory: "8Gi"
              cpu:    "8"
      containers:
        - name: vllm-speculative
          image: vllm/vllm-openai:latest
          imagePullPolicy: Always
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
            - --model=/models/verifier
            - --quantization=awq
            - --speculative-model=/models/draft
            - --num-speculative-tokens=5
            - --speculative-draft-tensor-parallel-size=1
            - --tensor-parallel-size=1
            - --gpu-memory-utilization=0.85
            - --max-model-len=2048
            - --max-num-seqs=64
            - --served-model-name=sre-llmops-speculative
            - --host=0.0.0.0
            - --port=8000
            - --disable-log-requests
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: "spawn"
          resources:
            requests:
              memory: "20Gi"
              cpu:    "8"
              nvidia.com/gpu: "1"
            limits:
              memory: "28Gi"
              cpu:    "8"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-storage
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: model-storage
          emptyDir:
            sizeLimit: "20Gi"
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "16Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-speculative-service
  namespace: inference
spec:
  type: ClusterIP
  selector:
    app: vllm-speculative
  ports:
    - name: http
      port: 8000
      targetPort: 8000
