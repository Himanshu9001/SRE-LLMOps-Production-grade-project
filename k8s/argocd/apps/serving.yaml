apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sre-llmops-serving
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL:        https://github.com/Himanshu9001/SRE-LLMOps-Production-grade-project
    targetRevision: main
    path:           k8s/serving
  destination:
    server:    https://kubernetes.default.svc
    namespace: inference
  syncPolicy:
    automated:
      prune:    true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration:    5s
        factor:      2
        maxDuration: 2m
  ignoreDifferences:
    - group: apps
      kind:  Deployment
      jsonPointers:
        - /spec/replicas
